# ── OdontoAgenda — Docker Compose (desarrollo local) ─────────────
services:

  postgres:
    image: postgis/postgis:16-3.4-alpine
    container_name: odontoagenda-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     odontoagenda
      POSTGRES_PASSWORD: odontoagenda
      POSTGRES_DB:       odontoagenda
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odontoagenda"]
      interval: 5s
      timeout: 5s
      retries: 10

  nats:
    image: nats:2.10-alpine
    container_name: odontoagenda-nats
    restart: unless-stopped
    command:
      - "--jetstream"
      - "--store_dir=/data"
      - "--http_port=8222"
      - "--name=odontoagenda-nats"
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats_data:/data
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: odontoagenda-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  nats-init:
    build:
      context: ./nats-init
      dockerfile: Dockerfile
    container_name: odontoagenda-nats-init
    restart: on-failure
    depends_on:
      nats:
        condition: service_healthy
    environment:
      NATS_URL: "nats://nats:4222"

  iam:
    build:
      context: ../..
      dockerfile: deployment/docker/Dockerfile
      target: iam
    container_name: odontoagenda-iam
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      nats-init:
        condition: service_completed_successfully
    environment:
      SERVICE_NAME:           "odontoagenda-iam"
      PORT:                   "8081"
      DATABASE_URL:           "postgres://odontoagenda:odontoagenda@postgres:5432/odontoagenda"
      NATS_URL:               "nats://nats:4222"
      JWT_SECRET:             "${JWT_SECRET}"
      JWT_ISSUER:             "odontoagenda.iam"
      ACCESS_TOKEN_TTL_MIN:   "15"
      REFRESH_TOKEN_TTL_DAYS: "30"
    ports:
      - "8081:8081"
    healthcheck:
      disable: true

  patient:
    build:
      context: ../..
      dockerfile: deployment/docker/Dockerfile
      target: patient
    container_name: odontoagenda-patient
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      nats-init:
        condition: service_completed_successfully
    environment:
      SERVICE_NAME: "odontoagenda-patient"
      PORT:         "8082"
      DATABASE_URL: "postgres://odontoagenda:odontoagenda@postgres:5432/odontoagenda"
      NATS_URL:     "nats://nats:4222"
      JWT_SECRET:   "${JWT_SECRET}"
      JWT_ISSUER:   "odontoagenda.iam"
    ports:
      - "8082:8082"
    healthcheck:
      disable: true

  professional:
    build:
      context: ../..
      dockerfile: deployment/docker/Dockerfile
      target: professional
    container_name: odontoagenda-professional
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      nats-init:
        condition: service_completed_successfully
    environment:
      SERVICE_NAME: "odontoagenda-professional"
      PORT:         "8083"
      DATABASE_URL: "postgres://odontoagenda:odontoagenda@postgres:5432/odontoagenda"
      NATS_URL:     "nats://nats:4222"
      JWT_SECRET:   "${JWT_SECRET}"
      JWT_ISSUER:   "odontoagenda.iam"
    ports:
      - "8083:8083"
    healthcheck:
      disable: true

  scheduling:
    build:
      context: ../..
      dockerfile: deployment/docker/Dockerfile
      target: scheduling
    container_name: odontoagenda-scheduling
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats-init:
        condition: service_completed_successfully
    environment:
      SERVICE_NAME: "odontoagenda-scheduling"
      PORT:         "8084"
      DATABASE_URL: "postgres://odontoagenda:odontoagenda@postgres:5432/odontoagenda"
      NATS_URL:     "nats://nats:4222"
      REDIS_URL:    "redis://redis:6379"
      JWT_SECRET:   "${JWT_SECRET}"
      JWT_ISSUER:   "odontoagenda.iam"
    ports:
      - "8084:8084"
    healthcheck:
      disable: true

  coverage:
    build:
      context: ../..
      dockerfile: deployment/docker/Dockerfile
      target: coverage
    container_name: odontoagenda-coverage
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats-init:
        condition: service_completed_successfully
    environment:
      SERVICE_NAME: "odontoagenda-coverage"
      PORT:         "8085"
      DATABASE_URL: "postgres://odontoagenda:odontoagenda@postgres:5432/odontoagenda"
      NATS_URL:     "nats://nats:4222"
      REDIS_URL:    "redis://redis:6379"
      JWT_SECRET:   "${JWT_SECRET}"
      JWT_ISSUER:   "odontoagenda.iam"
    ports:
      - "8085:8085"
    healthcheck:
      disable: true

  notifications:
    build:
      context: ../..
      dockerfile: deployment/docker/Dockerfile
      target: notifications
    container_name: odontoagenda-notifications
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      nats-init:
        condition: service_completed_successfully
    environment:
      SERVICE_NAME:           "odontoagenda-notifications"
      PORT:                   "8086"
      DATABASE_URL:           "postgres://odontoagenda:odontoagenda@postgres:5432/odontoagenda"
      NATS_URL:               "nats://nats:4222"
      JWT_SECRET:             "${JWT_SECRET}"
      JWT_ISSUER:             "odontoagenda.iam"
      NOTIFICATIONS_LOG_ONLY: "true"
      # Descomentar para habilitar canales reales:
      # WHATSAPP_ENABLED:     "true"
      # WHATSAPP_PROVIDER_URL:"https://api.twilio.com/..."
      # WHATSAPP_TOKEN:       "${WHATSAPP_TOKEN}"
      # EMAIL_ENABLED:        "true"
      # EMAIL_FROM:           "turnos@odontoagenda.com"
      # SENDGRID_API_KEY:     "${SENDGRID_API_KEY}"
      # SMS_ENABLED:          "true"
      # TWILIO_ACCOUNT_SID:   "${TWILIO_ACCOUNT_SID}"
      # TWILIO_AUTH_TOKEN:    "${TWILIO_AUTH_TOKEN}"
      # TWILIO_FROM_NUMBER:   "${TWILIO_FROM_NUMBER}"
    ports:
      - "8086:8086"
    healthcheck:
      disable: true

  billing:
    build:
      context: ../..
      dockerfile: deployment/docker/Dockerfile
      target: billing
    container_name: odontoagenda-billing
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      nats-init:
        condition: service_completed_successfully
      coverage:
        condition: service_started
    environment:
      SERVICE_NAME:        "odontoagenda-billing"
      PORT:                "8087"
      DATABASE_URL:        "postgres://odontoagenda:odontoagenda@postgres:5432/odontoagenda"
      NATS_URL:            "nats://nats:4222"
      JWT_SECRET:          "${JWT_SECRET}"
      JWT_ISSUER:          "odontoagenda.iam"
      COVERAGE_BASE_URL:   "http://odontoagenda-coverage:8085"
      MP_ACCESS_TOKEN:     "${MP_ACCESS_TOKEN}"
      MP_WEBHOOK_SECRET:   "${MP_WEBHOOK_SECRET}"
    ports:
      - "8087:8087"
    healthcheck:
      disable: true

volumes:
  postgres_data:
  nats_data:
  redis_data:
  